name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release app
        run: make build-app CONFIGURATION=Release CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Package app bundle
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ARCH="$(uname -m)"
          APP_PATH=".build/DerivedData/Build/Products/Release/TinyNet.app"
          ASSET_NAME="TinyNet-${TAG}-macos-${ARCH}.zip"

          if [[ ! -d "$APP_PATH" ]]; then
            echo "error: app bundle not found at $APP_PATH" >&2
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ASSET_NAME"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Create or update release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET_NAME" --clobber
          else
            gh release create "$TAG" "$ASSET_NAME" \
              --title "$TAG" \
              --notes "Automated release for $TAG"
          fi
